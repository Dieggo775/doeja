<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoeJá - Encontre centros de doação próximos</title>
    
    <!-- Fontshare: Satoshi + Boska -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&f[]=boska@500,700&display=swap" rel="stylesheet">
    
    <!-- Google Maps -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=SUA_API_KEY&callback=initMap&libraries=places"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <!-- Logo SVG -->
            <svg class="logo" viewBox="0 0 48 48" aria-label="DoeJá">
                <circle cx="24" cy="24" r="20" fill="none" stroke="currentColor" stroke-width="3"/>
                <path d="M18 18 L24 24 L30 18" stroke="currentColor" stroke-width="3" stroke-linecap="round" fill="none"/>
                <circle cx="24" cy="24" r="4" fill="currentColor"/>
            </svg>
            <h1 class="logo-text">Doe<span class="accent">Já</span></h1>
            <div class="header-actions">
                <button class="theme-toggle" data-theme-toggle aria-label="Alternar tema">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="main">
        <!-- Hero Section -->
        <section class="hero">
            <div class="container">
                <h2 class="hero-title">Encontre centros de doação próximos a você</h2>
                <p class="hero-subtitle">Roupas, alimentos, higiene. Faça a diferença onde mais importa.</p>
                
                <!-- Busca Principal -->
                <div class="search-section">
                    <div class="search-inputs">
                        <input type="text" id="searchLocation" placeholder="Digite seu bairro ou CEP" class="search-input">
                        <button class="search-btn" id="searchBtn">
                            <i data-lucide="search"></i>
                            Buscar
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Filtros -->
        <section class="filters-section">
            <div class="container">
                <div class="filters">
                    <select id="cidadeFilter" class="filter-select">
                        <option value="">Todas as cidades</option>
                    </select>
                    <select id="bairroFilter" class="filter-select">
                        <option value="">Todos os bairros</option>
                    </select>
                    <select id="ativoFilter" class="filter-select">
                        <option value="">Todos os status</option>
                        <option value="true">Ativos</option>
                        <option value="false">Inativos</option>
                    </select>
                    <button class="filter-btn" id="applyFilters">Filtrar</button>
                    <button class="clear-btn" id="clearFilters">Limpar</button>
                </div>
            </div>
        </section>

        <!-- Stats -->
        <section class="stats">
            <div class="container">
                <div class="stat-item">
                    <div class="stat-number" data-target="3">0</div>
                    <div class="stat-label">Centros ativos</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" data-target="150">0</div>
                    <div class="stat-label">Doações/mês</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" data-target="500">0</div>
                    <div class="stat-label">Famílias atendidas</div>
                </div>
            </div>
        </section>

        <!-- Mapa Principal -->
        <section class="map-section">
            <div class="container">
                <div class="map-container" id="map"></div>
            </div>
        </section>

        <!-- Lista de Centros -->
        <section class="centros-section">
            <div class="container">
                <div class="section-header">
                    <h3 class="section-title">Centros próximos</h3>
                    <div class="pagination" id="pagination"></div>
                </div>
                <div class="centros-grid" id="centrosGrid">
                    <!-- Cards serão populados via JS -->
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 DoeJá - Transformando solidariedade em ação. ODS 1 - Erradicação da Pobreza</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
